<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园地图坐标拾取工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        h2 {
            margin-bottom: 10px;
        }

        #container {
            position: relative;
            display: inline-block;
            border: 2px solid #333;
            background: white;
        }

        #map {
            display: block;
            max-width: 1000px;
        }

        .point {
            position: absolute;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border: 1px solid #ccc;
            width: 600px;
            min-height: 120px;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
        }

        button {
            margin-top: 10px;
            padding: 6px 12px;
        }
    </style>
</head>
<body>

<h2>校园地图坐标拾取工具</h2>

<p>选择地图图片，然后点击景点位置。坐标会自动显示。</p>

<input type="file" id="fileInput" accept="image/*">

<br><br>

<div id="container">
    <img id="map">
</div>

<div>
    <button onclick="clearPoints()">清空点</button>
</div>

<h3>坐标输出</h3>
<div id="output"></div>

<script>
    const fileInput = document.getElementById("fileInput");
    const map = document.getElementById("map");
    const container = document.getElementById("container");
    const output = document.getElementById("output");

    let count = 0;

    fileInput.addEventListener("change", function () {
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function (e) {
            map.src = e.target.result;
            output.textContent = "";
            count = 0;
            clearPoints();
        };

        reader.readAsDataURL(file);
    });

    map.addEventListener("click", function (event) {
        const rect = map.getBoundingClientRect();

        const displayX = event.clientX - rect.left;
        const displayY = event.clientY - rect.top;

        const scaleX = map.naturalWidth / map.clientWidth;
        const scaleY = map.naturalHeight / map.clientHeight;

        const realX = Math.round(displayX * scaleX);
        const realY = Math.round(displayY * scaleY);

        count++;

        const point = document.createElement("div");
        point.className = "point";
        point.style.left = displayX + "px";
        point.style.top = displayY + "px";
        container.appendChild(point);

        output.textContent += `${count}. x=${realX}, y=${realY}\n`;
    });

    function clearPoints() {
        const points = document.querySelectorAll(".point");
        points.forEach(p => p.remove());
        output.textContent = "";
        count = 0;
    }
</script>

</body>
</html>
