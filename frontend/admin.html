<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>校园地图管理中心</title><link rel="stylesheet" href="admin.css"></head><body>
<main class="admin-shell"><aside class="admin-nav"><div class="admin-brand"><p>Campus Navigation</p><h1>校园地图<br>管理中心</h1><span id="loadState">正在读取数据</span></div><nav>
<button class="active" data-page="summary"><svg><use href="#chart"/></svg>数据概况</button><button data-page="spots"><svg><use href="#pin"/></svg>地点管理</button><button data-page="roads"><svg><use href="#road"/></svg>道路管理</button><button data-page="validation"><svg><use href="#check"/></svg>数据检查</button></nav>
<div class="nav-actions"><button id="previewButton">进入用户模式预览</button><button id="logoutButton">退出管理员模式</button></div></aside>
<section class="workspace"><header class="workspace-header"><div><p id="pageEyebrow">数据概况</p><h2 id="pageTitle">校园地图运行概览</h2></div><button id="refreshButton" class="soft">刷新数据</button></header><div id="content" class="content"></div></section></main>
<div id="modal" class="modal hidden"><div class="modal-backdrop" data-close></div><section class="modal-card"><header><div><p id="modalEyebrow"></p><h3 id="modalTitle"></h3></div><button class="close" data-close>×</button></header><div id="modalBody"></div></section></div><div id="toast" class="toast"></div>
<svg class="defs"><symbol id="chart" viewBox="0 0 24 24"><path d="M4 19V9m6 10V5m6 14v-7m4 7H2"/></symbol><symbol id="pin" viewBox="0 0 24 24"><path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="2.5"/></symbol><symbol id="road" viewBox="0 0 24 24"><path d="M8 3 5 21m11-18 3 18M12 5v3m0 3v3m0 3v2"/></symbol><symbol id="check" viewBox="0 0 24 24"><path d="m4 12 5 5L20 6"/></symbol></svg><script src="admin.js"></script></body></html>
